<!doctype html>
<html lang='en'>
<head>
  <meta charset='utf-8' />
  <meta name='viewport' content='width=device-width, initial-scale=1' />
  <title>Portfolio Site Fluid Components - Responsive Design Hard Challenge 276</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, sans-serif; background: #fff7ed; color: #111827; }
    .canvas { width: 1280px; min-height: 720px; margin: 0 auto; position: relative; }
    .frame { position: absolute; left: 36px; top: 36px; width: 1208px; height: 648px; background: #fff; border: 5px solid #9a3412; border-radius: 20px; }
    .head { position: absolute; left: 60px; top: 60px; width: 1160px; height: 92px; border-radius: 12px; }
    .title { position: absolute; left: 78px; top: 74px; margin: 0; font-size: 30px; font-weight: 800; color: #9a3412; }
    .sub { position: absolute; left: 78px; top: 114px; margin: 0; font-size: 20px; color: #334155; }
    .blk { position: absolute; border-radius: 12px; padding: 10px 14px; overflow: hidden; }
    .blk h2 { margin: 0; font-size: 24px; font-weight: 700; color: #111827; }

    @media (max-width: 1280px) {
      .canvas { width: 100vw; min-height: 56.25vw; }
      .frame, .head, .title, .sub, .foot, .blk { transform-origin: top left; }
      .frame, .head, .title, .sub, .foot, .blk { transform: scale(calc(100vw / 1280)); }
    }
  </style>
</head>
<body>
  <main class='canvas'>
    <div class='frame'></div>
    <div class='head'></div>
    <h1 class='title'>Portfolio Site Fluid Components - Responsive Design Hard Challenge 276</h1>
    
    <section class='blk' style='left:80px;top:190px;width:540px;height:200px;background:#dbeafe;'><h2>Nav</h2></section><section class='blk' style='left:640px;top:190px;width:560px;height:200px;background:#e2e8f0;'><h2>Hero</h2></section><section class='blk' style='left:80px;top:410px;width:1120px;height:90px;background:#fef3c7;'><h2>About</h2></section><section class='blk' style='left:80px;top:520px;width:550px;height:90px;background:#dcfce7;'><h2>Projects</h2></section><section class='blk' style='left:650px;top:520px;width:550px;height:90px;background:#ede9fe;'><h2>Contact</h2></section>
    
  </main>
</body>
</html>
