<!DOCTYPE html>
<html>
<head>
<style>
body { font-family: sans-serif; padding: 20px; }
</style>
</head>
<body>
<style>
.advanced-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  grid-auto-rows: 200px;
  grid-gap: 20px;
}
.span-two { grid-column: span 2; grid-row: span 2; }
</style>
</body>
</html>
