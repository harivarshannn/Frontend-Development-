<!DOCTYPE html>
<html>
<head>
<style>
body { font-family: sans-serif; padding: 20px; }
</style>
</head>
<body>
<style>
.layout {
  display: grid;
  grid-template-areas: "h h" "s m";
  grid-template-columns: 200px 1fr;
}
header { grid-area: h; }
aside { grid-area: s; }
main { grid-area: m; }
</style>
</body>
</html>
